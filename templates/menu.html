<!-- BARRA SUPERIOR -->
<header class="topbar">

    <div class="topbar-left">
        <!-- BOTÓN MENÚ a la izquierda del logo -->
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <img src="{{ url_for('static', filename='fondo.jpg') }}" class="logo-empresa">
    </div>

    <div class="topbar-right">
        <span class="icono">🔔</span>
        <span class="icono">👤</span>
        <div class="usuario-info">
            <div class="usuario-nombre">{{ session.get('nombre', '') }}</div>
            <div class="usuario-rol">{{ session.get('rol', '') }}</div>
            <div class="usuario-sede">{{ session.get('sede', '') }}</div>
        </div>
    </div>

</header>

<!-- MENÚ LATERAL -->
<div id="sidebar" class="sidebar oculto">

    <h3>SAGER REPUESTOS</h3>

    <a href="/inicio">Inicio</a>

    <a href="/pendientes">Solicitudes Pendientes</a>

<script>
function toggleMenu() {
    var sidebar = document.getElementById("sidebar");
    if (sidebar) {
        sidebar.classList.toggle("oculto");
    }
}
</script>
