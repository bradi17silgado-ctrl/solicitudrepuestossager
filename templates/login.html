<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Inicio de Sesión</title>

    <style>

        body{
            background-image: url('/static/fondo.jpg');
            background-size: 750px;
            background-repeat: no-repeat;
            background-position: center 50px;
            background-attachment: fixed;
            background-color: #ffffff;
            min-height: 100vh;
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
            font-family:Arial, sans-serif;
        }

        .login-container{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.1);
            text-align:center;
            width:350px;
        }

        .login-container h2{
            margin-bottom:25px;
        }

        .login-container input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        .login-container button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#1e3a8a;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .login-container button:hover{
            background:#162d6b;
        }

        .error{
            color:red;
            margin-top:10px;
        }

    </style>

</head>
<body>

    <div class="login-container">

        <h2>Inicio de Sesión</h2>

        <form method="POST">

            <input
                type="text"
                name="usuario"
                placeholder="Correo electrónico"
                required
            >

            <input
                type="password"
                name="contraseña"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</body>
</html>
