<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes Pendientes</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

{% include 'menu.html' %}

<div class="main-content">


    <h2>Solicitudes Pendientes</h2>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                
                <th>Sede</th>
                <th>Vendedor</th>
                <th>Código</th>
                <th>Cantidad</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>

        {% for s in solicitudes %}
        <tr>

            
            <td>{{ s.sede }}</td>
            <td>{{ s.vendedor }}</td>
            <td>{{ s.codigo }}</td>
            <td>{{ s.cantidad }}</td>
            <td>{{ s.estado }}</td>
            <td>

                <a href="/estado/{{ s.id }}/Buscar"
                   class="btn btn-warning btn-sm">
                    Buscar
                </a>

                <a href="/estado/{{ s.id }}/Listo"
                   class="btn btn-success btn-sm">
                    Listo
                </a>

                <a href="/estado/{{ s.id }}/No Disponible"
                   class="btn btn-secondary btn-sm">
                    No Disponible
                </a>

                <a href="/estado/{{ s.id }}/Borrar"
                   class="btn btn-danger btn-sm">
                    Eliminar
                </a>
                        
            </td>
 

        </tr>
   
        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
