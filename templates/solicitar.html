<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Repuesto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<body>

<div class="main-content">

    <div class="container">

        <h1 class="mb-4 text-center">
            Nueva Solicitud
        </h1>

        <form method="POST">

            <!-- VENDEDOR -->

            <div class="mb-3">

                <label class="form-label">
                    Vendedor
                </label>

                <input
                    type="text"
                    name="vendedor"
                    class="form-control"
                    required>

            </div>

            <!-- CODIGO -->

            <div class="mb-3">

                <label class="form-label">
                    Código del Repuesto
                </label>

                <input
                    type="text"
                    name="codigo"
                    class="form-control"
                    required>

            </div>

            <!-- CANTIDAD -->

            <div class="mb-3">

                <label class="form-label">
                    Cantidad
                </label>

                <input
                    type="number"
                    name="cantidad"
                    class="form-control"
                    min="1"
                    required>

            </div>

            <!-- SEDE ORIGEN -->

            <div class="mb-3">

                <label class="form-label">
                    Sede Origen
                </label>

                <input
                    type="text"
                    class="form-control"
                    value="{{ session['sede'] }}"
                    readonly>

            </div>

            <!-- SEDE DESTINO -->

            <div class="mb-3">

                <label class="form-label">
                    Sede Destino
                </label>

                <select
                    name="sede_destino"
                    class="form-select"
                    required>

                    <option value="">
                        Seleccione una sede
                    </option>

                    {% if session['sede'] != "BODEGA CALLE 67" %}
                    <option value="BODEGA CALLE 67">
                        BODEGA CALLE 67
                    </option>
                    {% endif %}

                    {% if session['sede'] != "ALMACEN" %}
                    <option value="ALMACEN">
                        ALMACEN
                    </option>
                    {% endif %}

                    {% if session['sede'] != "ESQUINA" %}
                    <option value="ESQUINA">
                        ESQUINA
                    </option>
                    {% endif %}

                </select>

            </div>

            <!-- BOTONES -->

            <button
                type="submit"
                class="btn btn-primary">
                Registrar Solicitud
            </button>

            <a
                href="/pendientes"
                class="btn btn-secondary">
                Ver Solicitudes
            </a>

            <button
                type="button"
                class="btn-regresar"
                onclick="window.location.href='/'">
                ← Regresar
            </button>

        </form>

    </div>

</div>

<script>

setTimeout(function () {

    let alerta = document.querySelector(".alert-success");

    if (alerta) {
        alerta.style.display = "none";
    }

}, 3000);

</script>

</body>
</html>
