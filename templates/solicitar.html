<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Repuesto — SAGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    {% include 'menu.html' %}

    <div class="main-content">
        <div class="container" style="max-width:900px; padding-top: 30px;">

            <h2 class="text-center py-3 mb-4">Nueva Solicitud de Repuesto</h2>

            <!-- ALERTA FLASH -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert-success" id="alerta">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Vendedor</label>
                    <input type="text" name="vendedor" class="form-control" placeholder="" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Código del Repuesto</label>
                    <input type="text" name="codigo" class="form-control" placeholder="" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" name="cantidad" class="form-control" min="1" placeholder="" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Sede Origen</label>
                    <select name="sede_origen" class="form-select" required>
                        <option value="" disabled selected>Seleccione una sede</option>
                        <option value="BODEGA CALLE 67">BODEGA CALLE 67</option>
                        <option value="ALMACEN">ALMACEN</option>
                        <option value="ESQUINA">ESQUINA</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Sede Destino</label>
                    <select name="sede_destino" class="form-select" required>
                        <option value="" disabled selected>Seleccione una sede</option>
                        <option value="BODEGA CALLE 67">BODEGA CALLE 67</option>
                        <option value="ALMACEN">ALMACEN</option>
                        <option value="ESQUINA">ESQUINA</option>
                    </select>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        ✅ Registrar Solicitud
                    </button>
                    <a href="/inicio" class="btn btn-secondary">
                        ← Regresar
                    </a>
                </div>

            </form>

        </div>
    </div>

    <script>
    // Ocultar alerta después de 3 segundos
    setTimeout(function() {
        let alerta = document.getElementById('alerta');
        if (alerta) alerta.style.display = 'none';
    }, 3000);
    </script>

</body>
</html>
