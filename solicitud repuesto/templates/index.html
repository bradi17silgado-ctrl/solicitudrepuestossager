<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGER ERP</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- BARRA SUPERIOR -->
    <header class="topbar">

        <div class="topbar-left">
            <img src="{{ url_for('static', filename='fondo.jpg') }}" class="logo-empresa">

             


         <div class="usuario-info">
    <div class="usuario-nombre">{{ nombre }}</div>
    <div class="usuario-rol">{{ rol }}</div>
    <div class="usuario-sede">{{ sede }}</div>
</div>



            
       <div class="topbar-right">
            <span class="icono">🔔</span>
            <span class="icono">👤</span>
        </div>

    </header>

     <button class="menu-btn" onclick="toggleMenu()">
                ☰
            </button>
        </div>

    <!-- MENÚ LATERAL -->
    <div id="sidebar" class="sidebar oculto">

        <h3>SAGER REPUESTOS</h3>

        <a href="/solicitar">
            Solicitar Repuesto
        </a>

        <a href="/pendientes">
            Solicitudes Pendientes
        </a>

        <a href="/usuarios">
            Usuarios
        </a>

        <a href="/logout">
            Cerrar Sesión
        </a>

    </div>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <tbody id="tablaSolicitudes"></tbody>

    </div>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("oculto");
        }
    </script>

    <script>

    let solicitudes = [];

    const formulario = document.getElementById("formSolicitud");
    const tabla = document.getElementById("tablaSolicitudes");

    if(formulario){

        formulario.addEventListener("submit", function(e){

            e.preventDefault();

            const nuevaSolicitud = {
                id: solicitudes.length + 1,
                sede: document.getElementById("sede").value,
                vendedor: document.getElementById("vendedor").value,
                codigo: document.getElementById("codigo").value,
                cantidad: document.getElementById("cantidad").value,
                estado: "Pendiente"
            };

            solicitudes.push(nuevaSolicitud);

            actualizarTabla();

            formulario.reset();
        });

    }

    function actualizarTabla(){

        tabla.innerHTML = "";

        solicitudes.forEach(s => {

            tabla.innerHTML += `
                <tr>
                    <td>${s.sede}</td>
                    <td>${s.vendedor}</td>
                    <td>${s.codigo}</td>
                    <td>${s.cantidad}</td>
                    <td>${s.estado}</td>

                    <td>
                        <button class="btn btn-warning btn-sm"
                            onclick="cambiarEstado(${s.id}, 'En Busqueda')">
                            Buscar
                        </button>

                        <button class="btn btn-success btn-sm"
                            onclick="cambiarEstado(${s.id}, 'Listo')">
                            Listo
                        </button>

                        <button class="btn btn-secondary btn-sm"
                            onclick="cambiarEstado(${s.id}, 'No Disponible')">
                            No Disponible
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="eliminarSolicitud(${s.id})">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function cambiarEstado(id, estado){

        solicitudes = solicitudes.map(s => {
            if(s.id === id){
                s.estado = estado;
            }
            return s;
        });

        actualizarTabla();
    }

    function eliminarSolicitud(id){

        if(confirm("¿Está seguro de eliminar esta solicitud?")){

            solicitudes = solicitudes.filter(s => s.id !== id);

            actualizarTabla();
        }
    }

    </script>

</body>
</html>
