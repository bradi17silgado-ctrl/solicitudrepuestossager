<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Repuesto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<body>

<!-- CONTENIDO -->
<div class="main-content">

    <div class="container">

        <h1 class="mb-4 text-center">
            Nueva Solicitud
        </h1>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Vendedor
                </label>

                <input type="text"
                       name="vendedor"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Código del Repuesto
                </label>

                <input type="text"
                       name="codigo"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Cantidad
                </label>

                <input type="number"
                       name="cantidad"
                       class="form-control"
                       min="1"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Solicitud
                </label>
                 
                <select name="sede"
                        class="form-select"
                        required>

                    <option value="">
                        Sede Origen
                    </option>

                    <option value="BODEGA CALLE 67">
                        BODEGA CALLE 67
                    </option>

                    <option value="ALMACEN">
                        ALMACEN
                    </option>

                    <option value="ESQUINA">
                        ESQUINA
                    </option>

                </select>
                 <br>
                 <br>




                <select name="sede"
                        class="form-select"
                        required>

                    <option value="">
                        Sede Destino
                    </option>

                    <option value="BODEGA CALLE 67">
                        BODEGA CALLE 67
                    </option>

                    <option value="ALMACEN">
                        ALMACEN
                    </option>

                    <option value="ESQUINA">
                        ESQUINA
                    </option>

                </select>
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Registrar Solicitud
            </button>

            <a href="/pendientes"
               class="btn btn-secondary">
                Ver Solicitudes
            </a>

           <button class="btn-regresar" onclick="window.location.href='/'">
    ← Regresar
</button>

        </form>

    </div>

</div>

<script>
setTimeout(function() {
    let alerta = document.querySelector('.alert-success');
    if (alerta) {
        alerta.style.display = 'none';
    }
}, 3000);
</script>


</body>
</html>
